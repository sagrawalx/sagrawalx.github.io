<!doctype html>
<html>

<head>

<meta charset="UTF-8">

<link rel="stylesheet" href="{{ site.baseurl }}/css/style.css" type="text/css" />

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/katex.min.css" integrity="sha384-AfEj0r4/OFrOo5t7NnNe46zW/tFgW6x/bCJG8FqQCEo3+Aro6EYUG4+cU+KJWu/X" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/katex.min.js" integrity="sha384-g7c+Jr9ZivxKLnZTDUhnkOnsh30B4H0rpLUpJ4jAIKs4fnJI+sEnkvrMWph2EDg4" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/contrib/auto-render.min.js" integrity="sha384-mll67QQFJfxn0IYznZYonOWZ644AWYC+Pt2cHqMaRhXVrursRwvLnLaebdGIlYNa" crossorigin="anonymous" onload="renderMathInElement(document.body);"></script>

<title>
{{ site.data.translation.banners[page.language] }} / {{ page.title }}
</title>

</head>

<body>

<header>
<a id="banner" href="/{{ page.language }}/">{{ site.data.translation.banners[page.language] }}</a>

<nav id="languages">
<ul>
{% for x in site.data.translation.languages %}
<li><a href="/{{ x }}/" {% if x == page.language %}class="current"{% endif %}>{{ site.data.translation.labels[x] }}</a></li>
{% endfor %}
</ul>
</nav>

<nav id="pages">
<ul>
{% for x in site.data.translation.navigation %}
<li><a href="{% if x.href %}{% include link.md href=x.href %}{% else %}{{ x.url }}{% endif %}" {% if x.href %}{% if page.slug == x.href %}class="current"{% endif %}{% endif %}>{{ x[page.language] }}</a></li>
{% endfor %}
</ul>
</nav>
</header>
</nav>

<main>
<header>{{ page.title }}</header>
{{ content }}
</main>

</body>

</html>
