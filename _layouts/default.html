<!doctype html>
<html>

<head>

<meta charset="UTF-8">

<link rel="stylesheet" href="{{ site.baseurl }}/css/style.css" type="text/css" />

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.8.3/katex.min.css" integrity="sha384-B41nY7vEWuDrE9Mr+J2nBL0Liu+nl/rBXTdpQal730oTHdlrlXHzYMOhDU60cwde" crossorigin="anonymous">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.8.3/katex.min.js" integrity="sha384-L9gv4ooDLrYwW0QCM6zY3EKSSPrsuUncpx26+erN0pJX4wv1B1FzVW1SvpcJPx/8" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.8.3/contrib/auto-render.min.js" integrity="sha384-RkgGHBDdR8eyBOoWeZ/vpGg1cOvSAJRflCUDACusAAIVwkwPrOUYykglPeqWakZu" crossorigin="anonymous"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
      renderMathInElement(document.body);
    });
</script>
<!-- End KaTeX -->

<title>
{% if page.bannertext %}{{ page.bannertext }}{% else %}Shishir Agrawal{% endif %} — {{ page.title }}
</title>

</head>

<body>

<header id="banner">
    <a href="{{ site.baseurl }}/{% if page.bannerlink %}{{ page.bannerlink }}{% endif %}">{% if page.bannertext %}{{ page.bannertext }}{% else %}Shishir Agrawal{% endif %}</a>
</header>

{% unless page.nonav %}
<nav id="sitenav">
<ul id="pages">
    {% for p in site.data.navbar %}{% for q in site.html_pages %}{% if q.permalink == p %}<li><a href="{{ site.baseurl }}/{{ q.permalink }}" {% if page.permalink == p %} class="current"{% endif %}>{{ q.title }}</a></li>
    {% endif %}{% endfor %}{% endfor %}
</ul>
</nav>
{% endunless %}

<main>
{{ content }}
</main>


</body>

</html>
